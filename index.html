<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Rebeca</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Agenda Rebeca">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
  .app { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 18px; font-weight: 500; color: #1a1a18; }
  .header-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: #ffffff; color: #1a1a18; cursor: pointer; font-family: inherit; }
  .btn:hover { background: #f0ede8; }
  .btn-add { background: #E6F1FB; color: #185FA5; border-color: #185FA5; }
  .btn-export { background: #EAF3DE; color: #3B6D11; border-color: #3B6D11; }
  .btn-sync { background: #FAEEDA; color: #854F0B; border-color: #854F0B; }
  .btn-login { background: #E6F1FB; color: #185FA5; border-color: #185FA5; font-weight: 500; }
  .btn-sync:disabled { opacity: 0.55; cursor: default; }
  .sync-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 12px; color: #6b6b67; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #a0a09c; }
  .sync-dot.ok { background: #639922; }
  .sync-dot.syncing { background: #BA7517; animation: pulse 1s infinite; }
  .sync-dot.error { background: #E24B4A; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .login-banner { background: #E6F1FB; border: 0.5px solid #185FA5; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .login-banner p { font-size: 14px; color: #185FA5; }
  .login-banner p strong { font-weight: 500; }
  .search-bar { margin-bottom: 1rem; }
  .search-bar input { width: 100%; font-size: 14px; padding: 7px 12px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: #ffffff; color: #1a1a18; font-family: inherit; }
  .search-bar input:focus { outline: none; border-color: rgba(0,0,0,0.4); }
  .clients-grid { display: flex; flex-direction: column; gap: 12px; }
  .client-card { background: #ffffff; border: 0.5px solid rgba(0,0,0,0.10); border-radius: 12px; overflow: hidden; transition: box-shadow 0.15s, opacity 0.15s; }
  .client-card.has-pending { border-left: 3px solid #E24B4A; }
  .client-card.dragging { opacity: 0.4; }
  .client-card.drag-over { box-shadow: 0 0 0 2px #185FA5; }
  .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; user-select: none; }
  .drag-handle { display: flex; flex-direction: column; gap: 3px; padding: 4px 2px; cursor: grab; flex-shrink: 0; opacity: 0.35; }
  .drag-handle:hover { opacity: 0.7; }
  .drag-handle span { display: block; width: 14px; height: 1.5px; background: #1a1a18; border-radius: 2px; }
  .card-header-click { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; cursor: pointer; }
  .card-header-click:hover .client-name { color: #185FA5; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.pending { background: #E24B4A; box-shadow: 0 0 0 3px rgba(226,75,74,0.18); }
  .status-dot.ok { background: #639922; }
  .client-name { font-size: 15px; font-weight: 500; color: #1a1a18; transition: color 0.1s; }
  .client-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 2px; }
  .client-agency { font-size: 13px; color: #6b6b67; }
  .destino-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .toggle-icon { font-size: 12px; color: #a0a09c; transition: transform 0.2s; margin-left: 4px; flex-shrink: 0; }
  .toggle-icon.open { transform: rotate(180deg); }
  .move-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .move-btn { background: none; border: none; color: #a0a09c; cursor: pointer; font-size: 11px; padding: 1px 3px; line-height: 1; }
  .move-btn:hover { color: #1a1a18; }
  .move-btn:disabled { opacity: 0.15; cursor: default; }
  .card-body { padding: 0 16px 16px; display: none; }
  .card-body.open { display: block; }
  .card-body-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group.full { grid-column: 1 / -1; }
  .field-label { font-size: 11px; color: #a0a09c; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .field-input { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: #f5f5f3; color: #1a1a18; font-family: inherit; width: 100%; }
  .field-input:focus { outline: none; border-color: rgba(0,0,0,0.4); background: #ffffff; }
  textarea.field-input { resize: vertical; min-height: 60px; line-height: 1.5; }
  .fat-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .fat-month { display: flex; flex-direction: column; gap: 3px; }
  .fat-month label { font-size: 10px; color: #a0a09c; text-align: center; }
  .fat-month input { text-align: center; font-size: 12px; padding: 5px 4px; }
  .fat-total { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #6b6b67; background: #f5f5f3; border-radius: 8px; padding: 6px 10px; margin-top: 6px; }
  .fat-total strong { color: #1a1a18; }
  .destino-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .destino-tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; cursor: pointer; border: 0.5px solid rgba(0,0,0,0.18); background: #f5f5f3; color: #6b6b67; user-select: none; }
  .destino-tag.selected { border-color: #185FA5; background: #E6F1FB; color: #185FA5; font-weight: 500; }
  .destino-tag:hover { border-color: rgba(0,0,0,0.4); }
  .custom-destino { display: flex; gap: 6px; margin-top: 6px; }
  .custom-destino input { flex: 1; font-size: 13px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: #f5f5f3; color: #1a1a18; font-family: inherit; }
  .custom-destino button { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: none; color: #6b6b67; cursor: pointer; font-family: inherit; }
  .custom-destino button:hover { background: #f5f5f3; }
  .tasks-area { display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: center; gap: 8px; }
  .task-item input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: #639922; }
  .task-item input[type=text] { flex: 1; font-size: 13px; padding: 5px 8px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.18); background: #f5f5f3; color: #1a1a18; font-family: inherit; }
  .task-item input[type=text]:focus { outline: none; border-color: rgba(0,0,0,0.4); background: #ffffff; }
  .task-item.done input[type=text] { text-decoration: line-through; color: #a0a09c; }
  .task-rm { background: none; border: none; color: #a0a09c; cursor: pointer; font-size: 15px; padding: 0 2px; line-height: 1; }
  .task-rm:hover { color: #E24B4A; }
  .add-task-btn { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 0.5px dashed rgba(0,0,0,0.18); background: none; color: #6b6b67; cursor: pointer; font-family: inherit; align-self: flex-start; margin-top: 2px; }
  .add-task-btn:hover { background: #f5f5f3; }
  .card-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 0.5px solid rgba(0,0,0,0.10); }
  .btn-save { font-size: 12px; padding: 5px 14px; border-radius: 8px; border: 0.5px solid #185FA5; background: #E6F1FB; color: #185FA5; cursor: pointer; font-family: inherit; }
  .btn-del { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 0.5px solid #E24B4A; background: none; color: #E24B4A; cursor: pointer; font-family: inherit; }
  .empty { text-align: center; padding: 2.5rem; color: #6b6b67; font-size: 14px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.12); border-top-color: #185FA5; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 540px) {
    .card-body-inner { grid-template-columns: 1fr; }
    .field-group.full { grid-column: 1; }
    .fat-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Agenda Rebeca</h1>
    <div class="header-btns">
      <button class="btn btn-sync" id="btn-sync" onclick="syncDrive()">↻ Sincronizar</button>
      <button class="btn btn-export" onclick="exportExcel()">↓ Excel</button>
      <button class="btn btn-add" onclick="addClient()">+ Novo cliente</button>
    </div>
  </div>
  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-msg"><span class="spinner"></span>Iniciando...</span>
  </div>
  <div id="login-banner" style="display:none" class="login-banner">
    <p><strong>Conecte sua conta Google</strong> para sincronizar os dados entre todos os seus dispositivos.</p>
    <button class="btn btn-login" onclick="doLogin()">Entrar com Google</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Buscar cliente, agência ou destino..." oninput="renderList()">
  </div>
  <div class="clients-grid" id="clients-grid">
    <div class="empty"><span class="spinner"></span>Carregando...</div>
  </div>
</div>

<script>
const CLIENT_ID = '505705256831-b36eubjibrmobdd0pdm606cslnt20h21.apps.googleusercontent.com';
const REDIRECT_URI = 'https://rebecadecarvalhobarbosa.github.io/agenda-rebeca/';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DRIVE_FILE = 'agenda_rebeca_dados.json';

const MESES=[
  {k:'jan',l:'Janeiro'},{k:'fev',l:'Fevereiro'},{k:'mar',l:'Março'},
  {k:'abr',l:'Abril'},{k:'mai',l:'Maio'},{k:'jun',l:'Junho'},
  {k:'jul',l:'Julho'},{k:'ago',l:'Agosto'},{k:'set',l:'Setembro'},
  {k:'out',l:'Outubro'},{k:'nov',l:'Novembro'},{k:'dez',l:'Dezembro'}
];
const MESES_S1=MESES.slice(0,6), MESES_S2=MESES.slice(6,12);
const DESTINOS_PADRAO=['Nova York','Paris','Lisboa','Califórnia','Miami','Londres','México','Espanha','Dubai','Cancún','Roma','Tokyo','Orlando','Buenos Aires','Maldivas'];
const BADGE_COLORS={'Nova York':'#185FA5','Paris':'#993556','Lisboa':'#3B6D11','Califórnia':'#854F0B','Miami':'#0F6E56','Londres':'#534AB7','México':'#3B6D11','Espanha':'#993C1D','Dubai':'#BA7517','Cancún':'#0F6E56','Roma':'#993C1D','Tokyo':'#993556','Orlando':'#185FA5','Buenos Aires':'#534AB7','Maldivas':'#0F6E56'};
const BADGE_BG={'Nova York':'#E6F1FB','Paris':'#FBEAF0','Lisboa':'#EAF3DE','Califórnia':'#FAEEDA','Miami':'#E1F5EE','Londres':'#EEEDFE','México':'#EAF3DE','Espanha':'#FAECE7','Dubai':'#FAEEDA','Cancún':'#E1F5EE','Roma':'#FAECE7','Tokyo':'#FBEAF0','Orlando':'#E6F1FB','Buenos Aires':'#EEEDFE','Maldivas':'#E1F5EE'};
function getBadgeStyle(d){const bg=BADGE_BG[d]||'#f5f5f3';const c=BADGE_COLORS[d]||'#6b6b67';return`background:${bg};color:${c};border:0.5px solid ${c}44`;}

let clients=[], driveFileId=null, dragSrcId=null, saveTimer=null, accessToken=null;

function hasPending(c){return c.tarefas.some(t=>!t.done&&t.text.trim());}
function calcTotal(c){return MESES.reduce((a,m)=>{const v=parseFloat((c.fat[m.k]||'').replace(',','.'));return a+(isNaN(v)?0:v);},0);}
function fmtBRL(n){if(!n&&n!==0)return 'R$ 0';return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function newClient(id){const fat={};MESES.forEach(m=>fat[m.k]='');return{id:id||Date.now(),agencia:'',contato:'',telefone:'',instagram:'',whitelabel:'',destinos:[],fat,descricao:'',ultima_reuniao:'',tarefas:[],expanded:false};}

function setStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-msg');
  if(dot)dot.className='sync-dot '+state;
  if(txt)txt.innerHTML=msg;
}
function showLoginBanner(show){
  const b=document.getElementById('login-banner');
  if(b)b.style.display=show?'flex':'none';
}

function doLogin(){
  const url='https://accounts.google.com/o/oauth2/v2/auth'
    +'?client_id='+encodeURIComponent(CLIENT_ID)
    +'&redirect_uri='+encodeURIComponent(REDIRECT_URI)
    +'&response_type=token'
    +'&scope='+encodeURIComponent(SCOPES)
    +'&prompt=select_account';
  window.location.href=url;
}

function handleRedirect(){
  const hash=window.location.hash.substring(1);
  if(!hash)return false;
  const params=new URLSearchParams(hash);
  const token=params.get('access_token');
  if(!token)return false;
  accessToken=token;
  const exp=Date.now()+3500*1000;
  try{localStorage.setItem('ar_token',token);localStorage.setItem('ar_token_exp',String(exp));}catch(e){}
  history.replaceState(null,'',window.location.pathname);
  return true;
}

function loadToken(){
  try{
    const token=localStorage.getItem('ar_token');
    const exp=parseInt(localStorage.getItem('ar_token_exp')||'0');
    if(token&&Date.now()<exp){accessToken=token;return true;}
  }catch(e){}
  accessToken=null;return false;
}

async function callDrive(method,url,body,ct){
  const headers={'Authorization':'Bearer '+accessToken};
  if(ct)headers['Content-Type']=ct;
  const r=await fetch(url,{method,headers,body:body||undefined});
  if(r.status===401){accessToken=null;try{localStorage.removeItem('ar_token');}catch(e){}throw new Error('auth_expired');}
  if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
  const c=r.headers.get('content-type')||'';
  return c.includes('application/json')?r.json():r.text();
}

async function findOrCreateFile(){
  const res=await callDrive('GET','https://www.googleapis.com/drive/v3/files?q=name%3D%22'+encodeURIComponent(DRIVE_FILE)+'%22+and+trashed%3Dfalse&fields=files(id,name)');
  if(res.files&&res.files.length>0){driveFileId=res.files[0].id;return 'found';}
  const boundary='-------agendarebeca';
  const meta=JSON.stringify({name:DRIVE_FILE,mimeType:'application/json'});
  const content=JSON.stringify({clients:[],version:1});
  const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  const created=await callDrive('POST','https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',body,'multipart/related; boundary='+boundary);
  driveFileId=created.id;return 'created';
}

async function loadFromDrive(){
  if(!accessToken){
    setStatus('','');showLoginBanner(true);
    try{const d=localStorage.getItem('agenda_rebeca');if(d)clients=JSON.parse(d);}catch(e){}
    renderList();return;
  }
  showLoginBanner(false);
  setStatus('syncing','<span class="spinner"></span>Conectando ao Drive...');
  const btn=document.getElementById('btn-sync');if(btn)btn.disabled=true;
  try{
    const status=await findOrCreateFile();
    const data=await callDrive('GET','https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media');
    const parsed=typeof data==='string'?JSON.parse(data):data;
    clients=parsed.clients||[];
    try{localStorage.setItem('agenda_rebeca',JSON.stringify(clients));}catch(e){}
    const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setStatus('ok',(status==='created'?'Arquivo criado no Drive':'Sincronizado')+' — '+now);
  }catch(e){
    if(e.message==='auth_expired'){setStatus('error','Sessão expirada — faça login novamente');showLoginBanner(true);}
    else{setStatus('error','Erro ao conectar ao Drive');}
    try{const d=localStorage.getItem('agenda_rebeca');if(d)clients=JSON.parse(d);}catch(ex){}
  }finally{
    if(btn)btn.disabled=false;
    renderList();
  }
}

async function saveToDrive(){
  try{localStorage.setItem('agenda_rebeca',JSON.stringify(clients));}catch(e){}
  if(!driveFileId||!accessToken)return;
  setStatus('syncing','Salvando...');
  const btn=document.getElementById('btn-sync');if(btn)btn.disabled=true;
  try{
    const payload=JSON.stringify({clients,version:1,updatedAt:new Date().toISOString()});
    const boundary='-------agendarebeca';
    const meta=JSON.stringify({name:DRIVE_FILE,mimeType:'application/json'});
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${payload}\r\n--${boundary}--`;
    await callDrive('PATCH','https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=multipart',body,'multipart/related; boundary='+boundary);
    const now=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setStatus('ok','Salvo no Drive — '+now);
  }catch(e){
    if(e.message==='auth_expired'){showLoginBanner(true);}
    setStatus('error','Erro ao salvar');
  }finally{
    if(btn)btn.disabled=false;
  }
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveToDrive,1500);}
async function syncDrive(){clients.forEach(c=>{try{readCard(c.id);}catch(e){}});await loadFromDrive();}

function addClient(){const c=newClient();c.expanded=true;clients.unshift(c);renderList();scheduleSave();}
function toggleCard(id){const c=clients.find(x=>x.id===id);if(c){c.expanded=!c.expanded;renderList();}}
function moveCard(id,dir){
  readCard(id);
  const i=clients.findIndex(x=>x.id===id);if(i<0)return;
  const ni=i+dir;if(ni<0||ni>=clients.length)return;
  [clients[i],clients[ni]]=[clients[ni],clients[i]];
  renderList();scheduleSave();
}
function toggleDestino(id,d){
  readCard(id);const c=clients.find(x=>x.id===id);if(!c)return;
  const i=c.destinos.indexOf(d);if(i>=0)c.destinos.splice(i,1);else c.destinos.push(d);
  renderList();scheduleSave();
}
function addCustomDestino(id){
  readCard(id);const c=clients.find(x=>x.id===id);if(!c)return;
  const inp=document.getElementById('custom-dest-'+id);if(!inp)return;
  const v=inp.value.trim();if(!v)return;
  if(!c.destinos.includes(v))c.destinos.push(v);
  inp.value='';renderList();scheduleSave();
}
function readCard(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const g=document.getElementById('card-'+id);if(!g)return;
  ['agencia','contato','telefone','instagram','whitelabel','descricao','ultima_reuniao'].forEach(f=>{const el=g.querySelector('[data-f='+f+']');if(el)c[f]=el.value;});
  MESES.forEach(m=>{const el=g.querySelector('[data-f=fat_'+m.k+']');if(el)c.fat[m.k]=el.value;});
  const items=g.querySelectorAll('.task-item');c.tarefas=[];
  items.forEach(ti=>{const txt=ti.querySelector('input[type=text]').value;const done=ti.querySelector('input[type=checkbox]').checked;if(txt.trim())c.tarefas.push({text:txt,done});});
}
function saveClient(id){readCard(id);renderList();saveToDrive();}
function deleteClient(id){if(!confirm('Remover este cliente?'))return;clients=clients.filter(x=>x.id!==id);renderList();saveToDrive();}
function addTask(id){
  readCard(id);const c=clients.find(x=>x.id===id);if(!c)return;
  c.tarefas.push({text:'',done:false});renderList();
  setTimeout(()=>{const g=document.getElementById('card-'+id);if(!g)return;const its=g.querySelectorAll('.task-item input[type=text]');if(its.length)its[its.length-1].focus();},50);
}
function removeTask(id,idx){readCard(id);const c=clients.find(x=>x.id===id);if(!c)return;c.tarefas.splice(idx,1);renderList();scheduleSave();}

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderFatRow(meses,c){
  return meses.map(m=>`<div class="fat-month"><label>${m.l.slice(0,3)}</label><input type="text" class="field-input" data-f="fat_${m.k}" value="${esc(c.fat[m.k])}" placeholder="0,00"></div>`).join('');
}

function renderCard(c,idx,tot){
  const pending=hasPending(c),total=calcTotal(c),destList=c.destinos||[];
  const allDest=[...new Set([...DESTINOS_PADRAO,...destList])];
  const tagsHtml=allDest.map(d=>`<span class="destino-tag ${destList.includes(d)?'selected':''}" onclick="toggleDestino(${c.id},'${d.replace(/'/g,"\\'")}')">${esc(d)}</span>`).join('');
  const badgesHtml=destList.length?destList.map(d=>`<span class="destino-badge" style="${getBadgeStyle(d)}">${esc(d)}</span>`).join(''):'';
  const tasksHtml=c.tarefas.map((t,i)=>`
    <div class="task-item ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="(function(){readCard(${c.id});clients.find(x=>x.id===${c.id}).tarefas[${i}].done=this.checked;renderList();scheduleSave();}).call(this)">
      <input type="text" value="${esc(t.text)}" placeholder="Descreva a tarefa..." onblur="readCard(${c.id})">
      <button class="task-rm" onclick="removeTask(${c.id},${i})">✕</button>
    </div>`).join('');
  return`
  <div class="client-card ${pending?'has-pending':''}" id="card-${c.id}" draggable="true"
    ondragstart="onDragStart(event,${c.id})" ondragover="onDragOver(event,${c.id})"
    ondragleave="onDragLeave(event,${c.id})" ondrop="onDrop(event,${c.id})" ondragend="onDragEnd()">
    <div class="card-header">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="card-header-click" onclick="toggleCard(${c.id})">
        <div class="status-dot ${pending?'pending':'ok'}"></div>
        <div style="flex:1;min-width:0">
          <div class="client-name">${esc(c.agencia)||'<span style="color:#a0a09c;font-weight:400">Nova agência</span>'}</div>
          <div class="client-meta">${c.contato?`<span class="client-agency">${esc(c.contato)}</span>`:''}${badgesHtml}</div>
        </div>
        ${total>0?`<div style="font-size:13px;color:#6b6b67;margin-right:8px;white-space:nowrap">${fmtBRL(total)}</div>`:''}
        <div class="toggle-icon ${c.expanded?'open':''}">▼</div>
      </div>
      <div class="move-btns">
        <button class="move-btn" onclick="moveCard(${c.id},-1)" ${idx===0?'disabled':''}>▲</button>
        <button class="move-btn" onclick="moveCard(${c.id},1)" ${idx===tot-1?'disabled':''}>▼</button>
      </div>
    </div>
    <div class="card-body ${c.expanded?'open':''}">
      <div class="card-body-inner">
        <div class="field-group"><label class="field-label">Nome da agência</label><input class="field-input" data-f="agencia" type="text" value="${esc(c.agencia)}" placeholder="Ex: Agência XYZ"></div>
        <div class="field-group"><label class="field-label">Nome do contato</label><input class="field-input" data-f="contato" type="text" value="${esc(c.contato)}" placeholder="Ex: João Silva"></div>
        <div class="field-group"><label class="field-label">Telefone / WhatsApp</label><input class="field-input" data-f="telefone" type="text" value="${esc(c.telefone)}" placeholder="+55 31 9..."></div>
        <div class="field-group"><label class="field-label">Perfil do Instagram</label><input class="field-input" data-f="instagram" type="text" value="${esc(c.instagram)}" placeholder="@agenciaxyz"></div>
        <div class="field-group full"><label class="field-label">Link da whitelabel</label><input class="field-input" data-f="whitelabel" type="text" value="${esc(c.whitelabel)}" placeholder="https://..."></div>
        <div class="field-group full">
          <label class="field-label">Destinos foco</label>
          <div class="destino-tags">${tagsHtml}</div>
          <div class="custom-destino">
            <input type="text" id="custom-dest-${c.id}" placeholder="Outro destino..." onkeydown="if(event.key==='Enter')addCustomDestino(${c.id})">
            <button onclick="addCustomDestino(${c.id})">+ Adicionar</button>
          </div>
        </div>
        <div class="field-group full">
          <label class="field-label">Faturamento — 1º semestre (R$)</label>
          <div class="fat-row">${renderFatRow(MESES_S1,c)}</div>
          <label class="field-label" style="margin-top:10px">Faturamento — 2º semestre (R$)</label>
          <div class="fat-row">${renderFatRow(MESES_S2,c)}</div>
          <div class="fat-total">Total anual acumulado: <strong>${fmtBRL(total)}</strong></div>
        </div>
        <div class="field-group full"><label class="field-label">Descritivo do cliente</label><textarea class="field-input" data-f="descricao" rows="3" placeholder="Breve perfil, contexto e estratégia...">${esc(c.descricao)}</textarea></div>
        <div class="field-group full"><label class="field-label">Última reunião / link da reunião</label><input class="field-input" data-f="ultima_reuniao" type="text" value="${esc(c.ultima_reuniao)}" placeholder="DD/MM/AAAA ou https://meet.google.com/..."></div>
        <div class="field-group full">
          <label class="field-label" style="display:flex;align-items:center;gap:6px">Tarefas pendentes
            ${pending?'<span style="background:#FCEBEB;color:#A32D2D;font-size:10px;padding:2px 7px;border-radius:20px;border:0.5px solid #E24B4A">pendente</span>':''}
          </label>
          <div class="tasks-area">${tasksHtml}<button class="add-task-btn" onclick="addTask(${c.id})">+ adicionar tarefa</button></div>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn-del" onclick="deleteClient(${c.id})">Remover cliente</button>
        <button class="btn-save" onclick="saveClient(${c.id})">Salvar</button>
      </div>
    </div>
  </div>`;
}

function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const grid=document.getElementById('clients-grid');
  const f=clients.filter(c=>!q||c.agencia.toLowerCase().includes(q)||c.contato.toLowerCase().includes(q)||(c.destinos||[]).some(d=>d.toLowerCase().includes(q)));
  if(!f.length){grid.innerHTML='<div class="empty">Nenhum cliente ainda. Clique em "+ Novo cliente" para começar.</div>';return;}
  grid.innerHTML=f.map((c,i)=>renderCard(c,i,f.length)).join('');
}

function onDragStart(e,id){clients.forEach(c=>{try{readCard(c.id);}catch(ex){}});dragSrcId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('card-'+id);if(el)el.classList.add('dragging');},0);}
function onDragOver(e,id){e.preventDefault();if(id===dragSrcId)return;const el=document.getElementById('card-'+id);if(el)el.classList.add('drag-over');}
function onDragLeave(e,id){const el=document.getElementById('card-'+id);if(el)el.classList.remove('drag-over');}
function onDrop(e,targetId){
  e.preventDefault();if(dragSrcId===null||dragSrcId===targetId)return;
  const fi=clients.findIndex(x=>x.id===dragSrcId),ti=clients.findIndex(x=>x.id===targetId);
  if(fi<0||ti<0)return;
  const[moved]=clients.splice(fi,1);clients.splice(ti,0,moved);
  dragSrcId=null;renderList();scheduleSave();
}
function onDragEnd(){dragSrcId=null;document.querySelectorAll('.client-card').forEach(el=>el.classList.remove('dragging','drag-over'));}

function exportExcel(){
  if(!clients.length){alert('Nenhum cliente para exportar.');return;}
  clients.forEach(c=>{try{readCard(c.id);}catch(e){}});
  const header=['Agência','Contato','Telefone','Instagram','Whitelabel','Destinos',...MESES.map(m=>m.l+' (R$)'),'Total Anual (R$)','Descritivo','Última reunião','Tarefas pendentes','Status'];
  const rows=[header];
  for(const c of clients){
    const mVals=MESES.map(m=>{const v=parseFloat((c.fat[m.k]||'').replace(',','.'));return isNaN(v)?'':v;});
    const total=mVals.reduce((a,v)=>a+(typeof v==='number'?v:0),0);
    const tarefas=c.tarefas.filter(t=>t.text.trim()).map(t=>(t.done?'[feito] ':'')+t.text).join(' | ');
    rows.push([c.agencia,c.contato,c.telefone,c.instagram,c.whitelabel,(c.destinos||[]).join(', '),...mVals,total||'',c.descricao,c.ultima_reuniao,tarefas,hasPending(c)?'Pendente':'OK']);
  }
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:20},{wch:18},{wch:18},{wch:28},{wch:28},...MESES.map(()=>({wch:13})),{wch:16},{wch:35},{wch:22},{wch:45},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Agenda Rebeca');
  XLSX.writeFile(wb,'agenda_rebeca.xlsx');
}

window.addEventListener('load',()=>{
  const fromRedirect=handleRedirect();
  if(!fromRedirect)loadToken();
  loadFromDrive();
});
</script>
